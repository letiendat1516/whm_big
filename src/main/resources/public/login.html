<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Quản lý Vật liệu Xây dựng</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1e3c72,#2a5298); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:#fff; border-radius:12px; padding:40px; width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.login-box h1 { text-align:center; color:#1e3c72; margin-bottom:8px; font-size:22px; }
.login-box p.subtitle { text-align:center; color:#666; margin-bottom:24px; font-size:13px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; color:#333; font-weight:600; margin-bottom:4px; font-size:13px; }
.form-group input { width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px; transition:border .2s; }
.form-group input:focus { border-color:#1e3c72; outline:none; box-shadow:0 0 0 3px rgba(30,60,114,0.15); }
.btn-login { width:100%; padding:12px; background:#1e3c72; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; transition:background .2s; }
.btn-login:hover { background:#2a5298; }
.error-msg { color:#e74c3c; text-align:center; margin-top:12px; font-size:13px; display:none; }
.info { text-align:center; margin-top:16px; color:#888; font-size:11px; }
</style>
</head>
<body>
<div class="login-box">
    <h1>🏗️ Vật liệu Xây dựng</h1>
    <p class="subtitle">Hệ thống quản lý cửa hàng</p>
    <form id="loginForm">
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="123456" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Đăng nhập</button>
        <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="info">
        Tài khoản mặc định: admin / 123456<br>
        cashier1 | warehouse1 | hr1 | manager1
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/dashboard.html';
        } else {
            errEl.textContent = data.error || 'Đăng nhập thất bại';
            errEl.style.display = 'block';
        }
    } catch(err) {
        errEl.textContent = 'Lỗi kết nối server: ' + err.message;
        errEl.style.display = 'block';
    }
});
</script>
</body>
</html>
